    <div class="tv-outer">
      <div class="tv-screen">
        <!-- Inner layer — glitch animation lives here -->
        <div class="tv-inner" id="tvInner">
          <!-- SMPTE Color Bars top -->
          <div class="tv-bars" aria-hidden="true">
            <div class="tv-bar tv-bar--w"></div>
            <div class="tv-bar tv-bar--y"></div>
            <div class="tv-bar tv-bar--c"></div>
            <div class="tv-bar tv-bar--g"></div>
            <div class="tv-bar tv-bar--m"></div>
            <div class="tv-bar tv-bar--r"></div>
            <div class="tv-bar tv-bar--b"></div>
          </div>
          <!-- Bottom strip -->
          <div class="tv-bars-bottom" aria-hidden="true">
            <div class="tv-bar-b tv-bar-b--1"></div>
            <div class="tv-bar-b tv-bar-b--2"></div>
            <div class="tv-bar-b tv-bar-b--3"></div>
            <div class="tv-bar-b tv-bar-b--4"></div>
            <div class="tv-bar-b tv-bar-b--5"></div>
            <div class="tv-bar-b tv-bar-b--6"></div>
            <div class="tv-bar-b tv-bar-b--7"></div>

          <div class="tv-barcode tv-barcode--left" aria-hidden="true"></div>
          <div class="tv-barcode tv-barcode--right" aria-hidden="true"></div>
          <!-- Chaos blocks -->
          <div class="tv-chaos" aria-hidden="true">
            <div class="tv-cb tv-cb-1"></div>
            <div class="tv-cb tv-cb-2"></div>
            <div class="tv-cb tv-cb-3"></div>
            <div class="tv-cb tv-cb-4"></div>
            <div class="tv-cb tv-cb-5"></div>
            <div class="tv-cb tv-cb-6"></div>
            <div class="tv-cb tv-cb-7"></div>
            <div class="tv-cb tv-cb-8"></div>
            <div class="tv-cb tv-cb-9"></div>
            <div class="tv-cb tv-cb-10"></div>
            <div class="tv-cb tv-cb-11"></div>
            <div class="tv-cb tv-cb-12"></div>
            <div class="tv-cb tv-cb-13"></div>
            <div class="tv-cb tv-cb-14"></div>
            <div class="tv-cb tv-cb-15"></div>
            <div class="tv-cb tv-cb-16"></div>
            <div class="tv-cb tv-cb-17"></div>
            <div class="tv-cb tv-cb-18"></div>
            <div class="tv-cb tv-cb-19"></div>
            <div class="tv-cb tv-cb-20"></div>
            <div class="tv-cb tv-cb-21"></div>
            <div class="tv-cb tv-cb-22"></div>
            <div class="tv-cb tv-cb-23"></div>
            <div class="tv-cb tv-cb-24"></div>
            <div class="tv-cb tv-cb-25"></div>
            <div class="tv-cb tv-cb-26"></div>
            <div class="tv-cb tv-cb-27"></div>
            <div class="tv-cb tv-cb-28"></div>
            <div class="tv-cb tv-cb-29"></div>
            <div class="tv-cb tv-cb-30"></div>
            <div class="tv-cross tv-cross-1"></div>
            <div class="tv-cross tv-cross-2"></div>
            <div class="tv-cross tv-cross-3"></div>
          </div>
          <!-- Center content -->
          <div class="tv-center">
            <div class="tv-panel">
              <div class="tv-msg">STREAM<br>STARTING<br>SOON</div>
              <div class="tv-panel-bar">
                <div class="tv-progress">
                  <div class="tv-progress-fill" id="tvProgressFill"></div>
                </div>
                <span class="tv-pct" id="tvPct">0%</span>
              </div>
              <div class="tv-skip-hint" id="tvSkipHint" aria-hidden="true">
                <span class="tv-skip-desktop">PRESS SPACE OR ESC TO SKIP</span>
                <span class="tv-skip-mobile">TAP TO SKIP</span>
              </div>
            </div>
          </div>
        </div><!-- /tv-inner -->
        <!-- BIOS screen — shown after 100% load, before page reveal -->
        <div class="tv-bios" id="tvBios"></div>
        <!-- Fixed overlays — never move with glitch -->
        <div class="tv-scanlines" aria-hidden="true"></div>
        <canvas class="tv-grain-canvas" id="tvGrainCanvas" aria-hidden="true"></canvas>
        <canvas class="tv-glitch-canvas" id="tvGlitchCanvas" aria-hidden="true"></canvas>

  <!-- ========== PORTRAIT + NAME (slide together) ========== -->

  <script>!function(){var mx=parseFloat(sessionStorage.getItem('mx')||''),my=parseFloat(sessionStorage.getItem('my')||'');var x=isNaN(mx)?-200:mx,y=isNaN(my)?-200:my;var d=document.getElementById('cursorDot'),r=document.getElementById('cursorRing');if(d){d.style.left=x+'px';d.style.top=y+'px';}if(r){r.style.left=x+'px';r.style.top=y+'px';}}();</script>

  <!-- Page transition overlay -->
  <div id="pageOverlay"><span class="overlay-label" id="overlayLabel"></span></div>

  <!-- ========== PAGE TV OVERLAY ========== -->
  <div class="page-tv-overlay" aria-hidden="true">
    <div class="page-scanlines"></div>
    <canvas class="page-grain-canvas" id="pageGrainCanvas"></canvas>

  <div class="page-tv-frame" aria-hidden="true"></div>
  <!-- ========== CRT INNER STROKE ========== -->
  <svg class="page-tv-stroke" aria-hidden="true"></svg>
  <script>!function(){var W=window.innerWidth,H=window.innerHeight,m=W<=768,MC=m?12:38,MM=m?4:8,R=m?Math.min(Math.max(18,W*.03),28):Math.min(Math.max(40,W*.042),70),i='M '+(MC+R)+','+MC+' Q '+(W/2)+','+MM+' '+(W-MC-R)+','+MC+' Q '+(W-MC)+','+MC+' '+(W-MC)+','+(MC+R)+' Q '+(W-MM)+','+(H/2)+' '+(W-MC)+','+(H-MC-R)+' Q '+(W-MC)+','+(H-MC)+' '+(W-MC-R)+','+(H-MC)+' Q '+(W/2)+','+(H-MM)+' '+(MC+R)+','+(H-MC)+' Q '+MC+','+(H-MC)+' '+MC+','+(H-MC-R)+' Q '+MM+','+(H/2)+' '+MC+','+(MC+R)+' Q '+MC+','+MC+' '+(MC+R)+','+MC+' Z',o='M 0,0 L '+W+',0 L '+W+','+H+' L 0,'+H+' Z',f=document.querySelector('.page-tv-frame'),b=document.querySelector('.page-crt-bevel'),sv=document.querySelector('.page-tv-stroke');if(f){f.style.clipPath="path(evenodd, '"+o+' '+i+"')";f.style.visibility='visible';}if(b)b.style.clipPath="path('"+i+"')";if(sv){sv.setAttribute('viewBox','0 0 '+W+' '+H);sv.style.clipPath="path('"+i+"')";var p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',i);p.setAttribute('fill','none');p.setAttribute('stroke','rgba(30,28,26,0.10)');p.setAttribute('stroke-width','6');sv.appendChild(p);}}();</script>

  <script>
    (function(){
      var w = window.innerWidth;
      if (w < 1200) {
        window.FluidSimOverride = {
          CURL:               w < 600 ? 8   : w < 900 ? 12  : 16,
          SPLAT_RADIUS:       w < 600 ? 0.18 : w < 900 ? 0.20 : 0.22,
          SIM_RESOLUTION:     w < 600 ? 64  : w < 900 ? 96  : 128,
          PRESSURE_ITERATIONS:w < 600 ? 8   : w < 900 ? 12  : 16,
        };
      }
    })();
  </script>
