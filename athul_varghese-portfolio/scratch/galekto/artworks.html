<body class="page-artworks">
  <a href="#artworksGrid" class="skip-to-content">Ana içeriğe geç</a>

  <!-- ========== BACKGROUND ========== -->
  <div class="bg-layer" aria-hidden="true">
    <canvas class="bg-canvas" id="bgCanvas"></canvas>
  </div>

  <!-- ========== CURSOR ========== -->
  <div class="cursor" id="cursor" aria-hidden="true">
    <div class="cursor-ring" id="cursorRing"></div>
    <div class="cursor-dot" id="cursorDot"></div>
  </div>
  <script>!function(){var mx=parseFloat(sessionStorage.getItem('mx')||''),my=parseFloat(sessionStorage.getItem('my')||'');var x=isNaN(mx)?-200:mx,y=isNaN(my)?-200:my;var d=document.getElementById('cursorDot'),r=document.getElementById('cursorRing');if(d){d.style.left=x+'px';d.style.top=y+'px';}if(r){r.style.left=x+'px';r.style.top=y+'px';}}();</script>

  <!-- ========== FIXED HEADER ========== -->
  <header class="artworks-header">
    <div class="artworks-hero">
      <h1 class="artworks-hero-title">Artworks</h1>
      <div class="artworks-title-block">
        <a class="atb-item atb-link" href="https://instagram.com/galekto" target="_blank" rel="noopener noreferrer">Galekto</a>
        <span class="atb-div">·</span>
        <span class="atb-item">41.0082° N, 28.9784° E</span>
      </div>
    </div>
  </header>

  <!-- ========== MAIN ========== -->
  <main class="artworks-wrap">

    <!-- Grid -->
    <div class="artworks-grid" id="artworksGrid" role="list">
      <!-- injected by artworks.js -->
    </div>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-main">
          <nav class="footer-nav">
            <a href="/" class="footer-nav-link">Home</a>
            <a href="/projects" class="footer-nav-link">Projects</a>
            <a href="/artworks" class="footer-nav-link" aria-current="page">Artworks</a>
            <a href="/contact" class="footer-nav-link">Contact</a>
          </nav>
          <div class="footer-right">
            <a href="https://instagram.com/galekto" class="footer-nav-link footer-instagram" target="_blank" rel="noopener">Instagram ↗&#xFE0E;</a>
            <a href="https://www.linkedin.com/in/evrenyilmaz/" class="footer-nav-link" target="_blank" rel="noopener">LinkedIn ↗&#xFE0E;</a>
            <span class="footer-location">Istanbul, Turkey</span>
          </div>
        </div>
        <div class="footer-bottom">
          <span class="footer-copy">© 2026 Galekto. All rights reserved.</span>
        </div>
      </div>
    </footer>

  </main>

  <!-- ========== LIGHTBOX ========== -->
  <div role="status" id="srAnnouncer" class="sr-only" aria-live="polite"></div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="lightboxTitle" tabindex="-1">
    <canvas class="lightbox-bg-canvas" id="lightboxBgCanvas" aria-hidden="true"></canvas>
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">×</button>

    <div class="lightbox-inner">
      <div class="lightbox-img-wrap" id="lightboxImgWrap">
        <img class="lightbox-img" id="lightboxImg" src="" alt="" draggable="false">
        <span class="lb-img-counter" id="lbImgCounter"></span>
        <div class="lb-img-dots" id="lbImgDots"></div>
        <div class="lightbox-corners">
          <span class="lc tl"></span>
          <span class="lc tr"></span>
          <span class="lc bl"></span>
          <span class="lc br"></span>
        </div>
      </div>
      <div class="lightbox-panel">
        <div class="lightbox-panel-inner">
          <span class="lightbox-ref" id="lightboxRef">REF.001</span>
          <div class="lightbox-title-row">
            <button class="lb-nav lb-nav--prev" id="lbPrev" aria-label="Previous artwork">
              <span class="lb-nav-arrow">←</span>
            </button>
            <h2 class="lightbox-title" id="lightboxTitle"></h2>
            <button class="lb-nav lb-nav--next" id="lbNext" aria-label="Next artwork">
              <span class="lb-nav-arrow">→</span>
            </button>
          </div>
          <p class="lightbox-medium" id="lightboxMedium"></p>
          <p class="lightbox-dimensions" id="lightboxDimensions"></p>
          <div class="lightbox-rule"></div>
          <a class="lightbox-buy" id="lightboxBuy" href="#" target="_blank" rel="noopener">
            <span>Buy Original</span>
            <span class="buy-arrow">↗&#xFE0E;</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Page transition overlay -->
  <div id="pageOverlay"><span class="overlay-label" id="overlayLabel"></span></div>

  <!-- ========== PAGE TV OVERLAY ========== -->
  <div class="page-tv-overlay" aria-hidden="true">
    <div class="page-scanlines"></div>
    <canvas class="page-grain-canvas" id="pageGrainCanvas"></canvas>
    <div class="page-scanner-lines">
      <span style="--dur:10s;--op:0.10"></span>
      <span style="--dur:13s;--op:0.07"></span>
      <span style="--dur:17s;--op:0.04"></span>
    </div>
    <div class="page-inner-glow"></div>
    <div class="page-vignette"></div>
  </div>

  <!-- ========== CRT GLASS BEVEL ========== -->
  <div class="page-crt-bevel" aria-hidden="true"></div>
  <!-- ========== CRT CORNER FRAME ========== -->
  <div class="page-tv-frame" aria-hidden="true"></div>
  <!-- ========== CRT INNER STROKE ========== -->
  <svg class="page-tv-stroke" aria-hidden="true"></svg>
  <script>!function(){var W=window.innerWidth,H=window.innerHeight,m=W<=768,MC=m?12:38,MM=m?4:8,R=m?Math.min(Math.max(18,W*.03),28):Math.min(Math.max(40,W*.042),70),i='M '+(MC+R)+','+MC+' Q '+(W/2)+','+MM+' '+(W-MC-R)+','+MC+' Q '+(W-MC)+','+MC+' '+(W-MC)+','+(MC+R)+' Q '+(W-MM)+','+(H/2)+' '+(W-MC)+','+(H-MC-R)+' Q '+(W-MC)+','+(H-MC)+' '+(W-MC-R)+','+(H-MC)+' Q '+(W/2)+','+(H-MM)+' '+(MC+R)+','+(H-MC)+' Q '+MC+','+(H-MC)+' '+MC+','+(H-MC-R)+' Q '+MM+','+(H/2)+' '+MC+','+(MC+R)+' Q '+MC+','+MC+' '+(MC+R)+','+MC+' Z',o='M 0,0 L '+W+',0 L '+W+','+H+' L 0,'+H+' Z',f=document.querySelector('.page-tv-frame'),b=document.querySelector('.page-crt-bevel'),sv=document.querySelector('.page-tv-stroke');if(f){f.style.clipPath="path(evenodd, '"+o+' '+i+"')";f.style.visibility='visible';}if(b)b.style.clipPath="path('"+i+"')";if(sv){sv.setAttribute('viewBox','0 0 '+W+' '+H);sv.style.clipPath="path('"+i+"')";var p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',i);p.setAttribute('fill','none');p.setAttribute('stroke','rgba(30,28,26,0.10)');p.setAttribute('stroke-width','6');sv.appendChild(p);}}();</script>

  <script src="assets/js/transition.js?v=11" defer></script>
